project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - research.qmd
    - publications.qmd
    - projects.qmd
    - cv.qmd
    - contact.qmd
  resources:
    - assets/img/hero.jpg
    - assets/img/hero-optimized.jpg
    - assets/cv/Ran_Wang_CV_Public.pdf
    - assets/js/language-switch.js

lang: en

website:
  title: "Ran Wang"
  site-url: "https://Olivia-wr-research.github.io"
  description: "Ran Wang's academic website on urban and regional economics, scientific mobility, scientific networks, and regional innovation."
  search: false
  navbar:
    title: "Ran Wang"
    left:
      - text: "Home"
        href: index.qmd
      - text: "Research"
        href: research.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Projects"
        href: projects.qmd
      - text: "CV"
        href: cv.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - text: "GitHub"
        href: "https://github.com/Olivia-wr-research"
      - text: "中文"
        href: "/zh/"
  page-footer:
    left: "© 2026 Ran Wang"
    right: "Built with Quarto"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    smooth-scroll: true
    link-external-newwindow: false
    include-after-body:
      - assets/js/language-switch.html
